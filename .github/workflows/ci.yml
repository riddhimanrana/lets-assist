name: PR Quality Gates

on:
  pull_request:
    branches:
      - development
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      db: ${{ steps.filter.outputs.db }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect DB-related changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            db:
              - 'supabase/**'
              - 'lib/supabase/**'
              - 'app/**/auth/**'
              - 'app/auth/**'

  quality:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

  db-replay-validation:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.db == 'true' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Start local Supabase
        run: bun run supabase:start

      - name: Validate DB reset replay
        run: bun run supabase:reset

      - name: Show Supabase status
        run: bun run supabase:status

      - name: Stop local Supabase
        if: always()
        run: bun run supabase:stop
